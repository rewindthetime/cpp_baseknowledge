<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="assets/style.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <title>Feedback - CPP Baseknowledge</title>
</head>
<body>
    <header>
            <div class="container">
            <h1>C++ Base Knowledge | Feedback</h1>
            <p>by rewindthetime</p>
        </div>
    </header>
    <main>
        <section id="preface" class="section">
            <div class="container">
                <h2>Feedback</h2>
                <div class="feedbackContainer">
                    <div class="stars" id="stars">
                        <input type="radio" id="star5" name="rating" value="5">
                        <label for="star5">&#9733;</label>
                        
                        <input type="radio" id="star4" name="rating" value="4">
                        <label for="star4">&#9733;</label>
                        
                        <input type="radio" id="star3" name="rating" value="3">
                        <label for="star3">&#9733;</label>
                        
                        <input type="radio" id="star2" name="rating" value="2">
                        <label for="star2">&#9733;</label>
                        
                        <input type="radio" id="star1" name="rating" value="1">
                        <label for="star1">&#9733;</label>
                    </div>
                    <div>
                        <textarea type="text" class="modern-input" placeholder="Enter Your Feedback" id="FeedbackText"></textarea>
                    </div>
                    <div>
                        <button class="btn" id="submitBtn" onclick="fetchUserFeedback()">Submit</button>
                    </div>
                    
                </div>
            </div>
        </section>
    </main>
    <footer>
        <div class="container">
            <p>Made with ❤️ by rewindcats</p>
            <p><a href="https://github.com/rewindthetime/cpp_baseknowledge">View on GitHub</a></p>
        </div>
    </footer>

    <div class="scroll-progress"></div>
    <script src="assets/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/js-confetti@latest/dist/js-confetti.browser.js"></script>
    <script src="assets/rating.js"></script>
</body>
</html>
